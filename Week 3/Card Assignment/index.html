<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Card Assignment</title>

  <!-- Custom font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">

  <style>
    body {
      background-color: #dbeafe;
      font-family: 'Roboto', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .card {
      width: 500px;
      height: 750px;
      background-color: #ffffff;
      padding: 36px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
      box-sizing: border-box;
    }

    .card img {
      width: 100%;
      height: 300px;
      object-fit: cover;
      margin-bottom: 12px;
      border-radius: 12px;
      display: block;
    }

    .card h1 {
      font-family: 'Playfair Display', serif;
      color: #1e3a8a;
      font-size: 36px;
      margin-bottom: 12px;
    }

    .card p {
      font-size: 18px;
      color: #374151;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .card a button {
      background-color: #2563eb;
      color: white;
      border: none;
      padding: 14px 24px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }

    .card a button:hover {
      background-color: #1d4ed8;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb" alt="Nature landscape">
    <h1>Peaceful Escape</h1>
    <p>
      This card highlights a calm and beautiful outdoor scene. It shows how a simple layout
      can combine images, text, and buttons into a clean and useful design.
    </p>
   <a href="https://unsplash.com/s/photos/nature" target="_blank">
  <button>View Gallery</button>
</a>
  </div>
</body>
</html>
